<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>万年历</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container">
  <h1>万年历</h1>

  <div class="controls">
    <input type="number" id="yearInput" placeholder="年份" min="1900" max="2100">
    <input type="month" id="monthInput">
    <button onclick="goToday()">今天</button>
    <button onclick="prevMonth()">上月</button>
    <button onclick="nextMonth()">下月</button>
  </div>

  <div class="calendar-grid" id="calendar"></div>

  <div class="info" id="info"></div>

  <div class="version">v1.0.0</div>
</div>

<div class="drawer-overlay" id="drawerOverlay"></div>
<aside class="almanac-drawer" id="almanacDrawer" aria-hidden="true">
  <div class="drawer-header">
    <h2>黄历</h2>
    <button type="button" id="drawerCloseBtn">关闭</button>
  </div>
  <div class="drawer-content" id="drawerContent">点击日历中的日期查看黄历</div>
</aside>

<script src="./script.js"></script>
</body>
</html>
