<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>五子棋（AI对弈）</title>
<style>
:root {
  --bg: #f4efe3;
  --panel: #ffffff;
  --text: #2b2b2b;
  --accent: #825e38;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at top, #fbf7ef 0%, var(--bg) 60%);
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  color: var(--text);
}
.wrap {
  width: min(92vw, 620px);
  max-height: 95vh;
  background: var(--panel);
  border-radius: 16px;
  box-shadow: 0 14px 34px rgba(0,0,0,0.12);
  padding: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  width: 100%;
}
h1 { margin: 0; font-size: 22px; }
#status { font-size: 15px; color: #5f5f5f; }
.version {
  font-size: 12px;
  color: #999;
  margin-top: 2px;
}
.actions { display: flex; gap: 8px; }
button {
  border: none;
  border-radius: 10px;
  padding: 8px 12px;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  font-size: 14px;
}
button:active { transform: translateY(1px); }
.board {
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 12px;
  overflow: hidden;
}
canvas {
  width: 100%;
  height: 100%;
  display: block;
  background: linear-gradient(180deg, #e9c88f 0%, #dfba7a 100%);
  touch-action: none;
  border-radius: 12px;
}
.tip {
  margin-top: 10px;
  font-size: 13px;
  color: #666;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div>
      <h1>五子棋（AI对弈）</h1>
      <div id="status">当前：黑棋</div>
      <div class="version" id="version"></div>
    </div>
    <div class="actions">
      <button id="reset">重新开始</button>
    </div>
  </div>
  <div class="board"><canvas id="board"></canvas></div>
  <div class="tip">规则：黑白轮流落子，先连成五子者胜。</div>
</div>

<script src="game.js"></script>
</body>
</html>
