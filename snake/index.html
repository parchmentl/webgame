<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>贪吃蛇</title>
<style>
*{box-sizing:border-box}
body{margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:Arial;color:#fff}
.wrapper{text-align:center;width:100%}
canvas{background:#000;border-radius:14px;touch-action:none;box-shadow:0 0 20px rgba(0,0,0,.6)}
</style>
</head>
<body>
<div class="wrapper" id="root"></div>
<script>
// Game config
const CONFIG = {
  GRID: 20,
  START_SPEED: 380,
  MIN_SPEED: 110,
  SPEED_STEP: 4,
  INITIAL_LENGTH: 1,
  VERSION: '1.0.4'
};

// Game state
const gameState = {
  snake: [{x: 10, y: 10}],
  dir: {x: 1, y: 0},
  nextDir: {x: 1, y: 0},
  food: null,
  score: 0,
  speed: CONFIG.START_SPEED,
  lastTime: 0,
  running: false,
  started: false,
  gameOver: false,
  foodBlink: 0
};

// UI elements
const ui = {};

// Initialize game
function init() {
  createDOM();
  setupEventListeners();
  resizeCanvas();
  gameState.food = randomFood();
  draw();
  updateControls();
  requestAnimationFrame(gameLoop);
}

// Create all DOM elements with JavaScript
function createDOM() {
  const root = document.getElementById('root');
  
  const h2 = document.createElement('h2');
  h2.textContent = '🐍 贪吃蛇';
  h2.style.margin = '0 0 8px 0';
  
  const scoreDiv = document.createElement('div');
  scoreDiv.style.fontSize = '20px';
  scoreDiv.style.margin = '8px';
  const scoreSpan = document.createElement('span');
  scoreSpan.id = 'score';
  scoreSpan.textContent = '0';
  scoreDiv.textContent = '得分：';
  scoreDiv.appendChild(scoreSpan);
  
  const versionDiv = document.createElement('div');
  versionDiv.style.marginTop = '4px';
  versionDiv.style.fontSize = '12px';
  versionDiv.style.color = '#aaa';
  versionDiv.textContent = `v${CONFIG.VERSION}`;
  
  const controlsDiv = document.createElement('div');
  controlsDiv.style.display = 'flex';
  controlsDiv.style.justifyContent = 'center';
  controlsDiv.style.gap = '8px';
  controlsDiv.style.margin = '6px 0 4px 0';
  
  const startBtn = document.createElement('button');
  startBtn.id = 'startBtn';
  startBtn.textContent = '开始';
  startBtn.style.cssText = 'padding:6px 18px;border-radius:999px;border:1px solid #555;background:#111;color:#fff;font-size:14px;cursor:pointer;margin:0';
  
  const pauseBtn = document.createElement('button');
  pauseBtn.id = 'pauseBtn';
  pauseBtn.textContent = '暂停';
  pauseBtn.style.cssText = startBtn.style.cssText;
  
  controlsDiv.appendChild(startBtn);
  controlsDiv.appendChild(pauseBtn);
  
  const resultDiv = document.createElement('div');
  resultDiv.id = 'result';
  resultDiv.style.cssText = 'margin-top:4px;font-size:13px;color:#ccc;min-height:1em;height:1.4em';
  
  const canvas = document.createElement('canvas');
  canvas.id = 'game';
  canvas.style.display = 'block';
  canvas.style.margin = '0 auto';
  
  const p = document.createElement('p');
  p.textContent = '滑动屏幕控制方向';
  p.style.margin = '8px 0 0 0';
  
  root.appendChild(h2);
  root.appendChild(scoreDiv);
  root.appendChild(versionDiv);
  root.appendChild(controlsDiv);
  root.appendChild(resultDiv);
  root.appendChild(canvas);
  root.appendChild(p);
  
  // Store references
  ui.canvas = canvas;
  ui.ctx = canvas.getContext('2d');
  ui.scoreEl = scoreSpan;
  ui.startBtn = startBtn;
  ui.pauseBtn = pauseBtn;
  ui.resultEl = resultDiv;
}

function setupEventListeners() {
  ui.startBtn.addEventListener('click', startOrRestartGame);
  ui.pauseBtn.addEventListener('click', togglePauseContinue);
  window.addEventListener('resize', resizeCanvas);
  document.addEventListener('keydown', handleKeyboard);
  ui.canvas.addEventListener('touchstart', handleTouchStart, {passive: false});
  ui.canvas.addEventListener('touchend', handleTouchEnd, {passive: false});
  ui.canvas.addEventListener('touchmove', handleTouchMove, {passive: false});
}

let canvasSize = 0, cellSize = 0;
function resizeCanvas() {
  const size = Math.min(
    window.innerWidth * 0.92,
    window.innerHeight * 0.72
  );
  const dpr = window.devicePixelRatio || 1;
  ui.canvas.style.width = size + 'px';
  ui.canvas.style.height = size + 'px';
  ui.canvas.width = size * dpr;
  ui.canvas.height = size * dpr;
  ui.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  canvasSize = size;
  cellSize = size / CONFIG.GRID;
  if (gameState.started) draw();
}

function randomFood() {
  const free = [];
  for (let y = 0; y < CONFIG.GRID; y++) {
    for (let x = 0; x < CONFIG.GRID; x++) {
      if (!gameState.snake.some(s => s.x === x && s.y === y)) {
        free.push({x, y});
      }
    }
  }
  return free.length > 0 ? free[Math.floor(Math.random() * free.length)] : null;
}

function update() {
  gameState.dir = gameState.nextDir;
  const head = {
    x: gameState.snake[0].x + gameState.dir.x,
    y: gameState.snake[0].y + gameState.dir.y
  };
  
  // Check bounds
  if (head.x < 0 || head.y < 0 || head.x >= CONFIG.GRID || head.y >= CONFIG.GRID) {
    endGame();
    return;
  }
  
  // Check collision with self
  if (gameState.snake.some(s => s.x === head.x && s.y === head.y)) {
    endGame();
    return;
  }
  
  gameState.snake.unshift(head);
  
  // Check food
  if (head.x === gameState.food.x && head.y === gameState.food.y) {
    gameState.score++;
    ui.scoreEl.textContent = gameState.score;
    const newFood = randomFood();
    if (!newFood) {
      endGame('full');
      return;
    }
    gameState.food = newFood;
    gameState.speed = Math.max(CONFIG.MIN_SPEED, CONFIG.START_SPEED - gameState.score * CONFIG.SPEED_STEP);
  } else {
    gameState.snake.pop();
  }
  gameState.foodBlink += 0.1;
}

function draw() {
  const ctx = ui.ctx;
  const g = canvasSize;
  const c = cellSize;
  
  // Background
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, g, g);
  
  // Border
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.strokeRect(0, 0, g, g);
  
  // Grid
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1.5;
  for (let i = 1; i < CONFIG.GRID; i++) {
    const pos = i * c;
    ctx.beginPath();
    ctx.moveTo(pos, 0);
    ctx.lineTo(pos, g);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, pos);
    ctx.lineTo(g, pos);
    ctx.stroke();
  }
  
  // Food with blink
  if (gameState.food) {
    const alpha = 0.75 + 0.25 * Math.sin(gameState.foodBlink * 6);
    ctx.fillStyle = `rgba(255,50,50,${alpha})`;
    const fx = gameState.food.x * c + c / 2;
    const fy = gameState.food.y * c + c / 2;
    ctx.beginPath();
    ctx.arc(fx, fy, c / 2.5, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Snake
  gameState.snake.forEach((s, i) => {
    const sx = s.x * c + 1;
    const sy = s.y * c + 1;
    const sc = c - 2;
    
    if (i === 0) {
      // Head with glow
      const grad = ctx.createRadialGradient(sx + sc/2, sy + sc/2, sc/4, sx + sc/2, sy + sc/2, sc);
      grad.addColorStop(0, '#3cff3c');
      grad.addColorStop(1, 'rgba(60,255,60,0.1)');
      ctx.fillStyle = grad;
    } else {
      ctx.fillStyle = '#00aa00';
    }
    ctx.fillRect(sx, sy, sc, sc);
    
    // Border
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.strokeRect(sx, sy, sc, sc);
  });
}

function gameLoop(timestamp) {
  if (gameState.running && timestamp - gameState.lastTime > gameState.speed) {
    update();
    draw();
    gameState.lastTime = timestamp;
  }
  requestAnimationFrame(gameLoop);
}

function handleKeyboard(e) {
  if (e.key === 'ArrowUp' && gameState.dir.y !== 1) gameState.nextDir = {x: 0, y: -1};
  if (e.key === 'ArrowDown' && gameState.dir.y !== -1) gameState.nextDir = {x: 0, y: 1};
  if (e.key === 'ArrowLeft' && gameState.dir.x !== 1) gameState.nextDir = {x: -1, y: 0};
  if (e.key === 'ArrowRight' && gameState.dir.x !== -1) gameState.nextDir = {x: 1, y: 0};
}

let touchStart = {x: 0, y: 0};
function handleTouchStart(e) {
  e.preventDefault();
  touchStart.x = e.touches[0].clientX;
  touchStart.y = e.touches[0].clientY;
}

function handleTouchEnd(e) {
  e.preventDefault();
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
  
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 0 && gameState.dir.x !== -1) gameState.nextDir = {x: 1, y: 0};
    else if (dx < 0 && gameState.dir.x !== 1) gameState.nextDir = {x: -1, y: 0};
  } else {
    if (dy > 0 && gameState.dir.y !== -1) gameState.nextDir = {x: 0, y: 1};
    else if (dy < 0 && gameState.dir.y !== 1) gameState.nextDir = {x: 0, y: -1};
  }
}

function handleTouchMove(e) {
  e.preventDefault();
}

function restart() {
  gameState.snake = [{x: 10, y: 10}];
  gameState.dir = {x: 1, y: 0};
  gameState.nextDir = {x: 1, y: 0};
  gameState.score = 0;
  gameState.speed = CONFIG.START_SPEED;
  gameState.food = randomFood() || {x: 0, y: 0};
  gameState.foodBlink = 0;
  gameState.lastTime = 0;
  gameState.gameOver = false;
  ui.scoreEl.textContent = '0';
}

function startGame() {
  restart();
  gameState.running = true;
  gameState.started = true;
  ui.resultEl.textContent = '';
  draw();
  updateControls();
}

function endGame(type) {
  gameState.running = false;
  gameState.gameOver = true;
  let msg = '游戏结束！得分：' + gameState.score;
  if (type === 'full') {
    msg = '太强了！你已经填满了整个棋盘，最终得分：' + gameState.score;
  }
  ui.resultEl.textContent = msg;
  updateControls();
}

function startOrRestartGame() {
  startGame();
}

function togglePauseContinue() {
  if (!gameState.started || gameState.gameOver) return;
  gameState.running = !gameState.running;
  ui.resultEl.textContent = gameState.running ? '' : '已暂停';
  updateControls();
}

function updateControls() {
  ui.startBtn.textContent = gameState.started ? '重新开始' : '开始';
  ui.pauseBtn.textContent = gameState.running ? '暂停' : '继续';
  ui.pauseBtn.disabled = !gameState.started || gameState.gameOver;
}

// Start
init();
</script>
</body>
</html>
