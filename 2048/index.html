<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>2048 游戏</title>
<style>
body {
    font-family: 'Arial', sans-serif;
    background: #faf8ef;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding-top: max(16px, env(safe-area-inset-top));
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    padding-left: max(20px, calc(env(safe-area-inset-left) + 20px));
    padding-right: max(20px, calc(env(safe-area-inset-right) + 20px));
    touch-action: none;
    overscroll-behavior: none;
}
.app {
    width: min(100%, 460px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
}
#game-container {
    background: #bbada0;
    width: 100%;
    aspect-ratio: 1 / 1;
    padding: 3.5%;
    border-radius: 10px;
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 3.5%;
}
.cell {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: #cdc1b4;
    border-radius: 5px;
    font-size: clamp(20px, 7vw, 32px);
    font-weight: bold;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #776e65;
    user-select: none;
}
.cell-2 {background:#eee4da;color:#776e65;}
.cell-4 {background:#ede0c8;color:#776e65;}
.cell-8 {background:#f2b179;color:#f9f6f2;}
.cell-16 {background:#f59563;color:#f9f6f2;}
.cell-32 {background:#f67c5f;color:#f9f6f2;}
.cell-64 {background:#f65e3b;color:#f9f6f2;}
.cell-128 {background:#edcf72;color:#f9f6f2;}
.cell-256 {background:#edcc61;color:#f9f6f2;}
.cell-512 {background:#edc850;color:#f9f6f2;}
.cell-1024 {background:#edc53f;color:#f9f6f2;}
.cell-2048 {background:#edc22e;color:#f9f6f2;}
.score-board {
    position: static;
    width: 100%;
    display:flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 6px;
    font-size:18px;
    font-weight:bold;
}
.version {
    font-size:12px;
    font-weight:normal;
    color:#776e65;
    align-self:flex-end;
}
.clock {
    font-size:12px;
    font-weight:normal;
    color:#776e65;
    align-self:flex-end;
}
button {
    width: 100%;
    padding:10px 20px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#8f7a66;
    color:#f9f6f2;
    cursor:pointer;
}
@media (max-width: 420px) {
    .score-board {
        font-size: 16px;
    }
    .version {
        font-size: 11px;
    }
    button {
        font-size: 15px;
    }
}
</style>
</head>
<body>
<div class="app">
    <div class="score-board">
        <div>分数: <span id="score">0</span></div>
        <div class="clock" id="clock">--:--:--</div>
        <div class="version">v1.1.0</div>
    </div>
    <div id="game-container"></div>
    <button id="restartBtn">重新开始</button>
</div>

<script src="game.js"></script>
</body>
</html>
