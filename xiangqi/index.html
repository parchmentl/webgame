<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>中国象棋 · 双人对弈（HTML单文件）</title>
<style>
  :root{
    --bg:#0f1115;
    --panel:#151925;
    --line:#3a4156;
    --text:#e8ecff;
    --muted:#9aa3bf;
    --red:#ff5a67;
    --black:#d6d6d6;
    --hint:#4dd0ff;
    --good:#53f28b;
    --bad:#ffb74d;
    --cell: min(9.5vw, 48px);
  }
  body{
    margin:0;
    background: radial-gradient(1200px 600px at 50% 0%, #1a1f2e 0%, var(--bg) 60%);
    color:var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC","Noto Sans CJK SC","Microsoft YaHei", Arial;
    display:flex;
    justify-content:center;
    padding:18px 12px 28px;
  }
  .app{
    width:min(980px, 100%);
    display:grid;
    grid-template-columns: 1fr 320px;
    gap:14px;
    align-items:start;
  }
  @media (max-width: 860px){
    .app{ grid-template-columns: 1fr; }
  }
  .boardWrap{
    background: linear-gradient(180deg, #111522, #0d1018);
    border:1px solid #232a3a;
    border-radius:16px;
    padding:14px;
    box-shadow: 0 16px 45px rgba(0,0,0,.45);
  }
  canvas{
    width: calc(var(--cell) * 9 + 28px);
    height: calc(var(--cell) * 10 + 28px);
    max-width:100%;
    display:block;
    margin:0 auto;
    touch-action: manipulation;
  }
  .side{
    background: linear-gradient(180deg, #141a28, #0f131d);
    border:1px solid #232a3a;
    border-radius:16px;
    padding:14px;
    box-shadow: 0 16px 45px rgba(0,0,0,.45);
  }
  .title{
    display:flex; align-items:baseline; justify-content:space-between;
    gap:10px;
    margin-bottom:10px;
  }
  .title h1{ font-size:16px; margin:0; font-weight:700; letter-spacing:.2px; }
  .title .ver{ font-size:12px; color:var(--muted); }
  .row{ display:flex; gap:10px; flex-wrap:wrap; margin:10px 0; }
  button{
    appearance:none;
    border:1px solid #2a3247;
    background:#141a28;
    color:var(--text);
    padding:10px 12px;
    border-radius:12px;
    font-weight:600;
    cursor:pointer;
    transition:.15s transform,.15s background,.15s border;
  }
  button:hover{ border-color:#3b4766; background:#182035; }
  button:active{ transform: translateY(1px); }
  .pill{
    display:inline-flex; align-items:center; gap:8px;
    padding:8px 10px;
    border-radius:999px;
    border:1px solid #263048;
    background:#12182a;
    font-size:12px;
    color:var(--muted);
  }
  .dot{ width:10px;height:10px;border-radius:50%; background:#999; }
  .dot.red{ background: var(--red); }
  .dot.black{ background: #bdbdbd; }
  .status{
    margin-top:10px;
    padding:10px 12px;
    border-radius:12px;
    border:1px solid #263048;
    background:#101627;
    line-height:1.5;
    font-size:13px;
  }
  .status b{ color:var(--text); }
  .status .ok{ color: var(--good); font-weight:700; }
  .status .warn{ color: var(--bad); font-weight:700; }
  .log{
    margin-top:10px;
    border:1px solid #263048;
    background:#0f1423;
    border-radius:12px;
    overflow:hidden;
  }
  .logHeader{
    padding:10px 12px;
    font-weight:700;
    font-size:12px;
    color:var(--muted);
    border-bottom:1px solid #1f2740;
    display:flex; justify-content:space-between; align-items:center;
  }
  .logBody{
    max-height:260px;
    overflow:auto;
    padding:10px 12px;
    font-size:12px;
    color:#c9d1ff;
  }
  .logBody div{ padding:3px 0; opacity:.95; }
  .hint{
    margin-top:10px;
    color:var(--muted);
    font-size:12px;
    line-height:1.6;
  }
  .kbd{
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New";
    font-size:11px;
    padding:2px 6px;
    border-radius:8px;
    background:#0b0f1b;
    border:1px solid #27314b;
    color:#bcd0ff;
  }
</style>
</head>
<body>
<div class="app">
  <div class="boardWrap">
    <canvas id="cv" width="520" height="580"></canvas>
  </div>

  <div class="side">
    <div class="title">
      <h1>中国象棋 · 双人对弈</h1>
      <div class="ver">单文件版</div>
    </div>

    <div class="row">
      <div class="pill"><span class="dot red"></span>红方</div>
      <div class="pill"><span class="dot black"></span>黑方</div>
      <div class="pill"><span class="dot" id="turnDot"></span><span id="turnText">红先</span></div>
    </div>

    <div class="row">
      <button id="btnReset">重新开局</button>
      <button id="btnUndo">悔棋</button>
    </div>

    <div class="status" id="status">
      <div>点击棋子选择，再点击目标格落子。</div>
      <div>提示：红方在下（y=9），黑方在上（y=0）。</div>
    </div>

    <div class="log">
      <div class="logHeader">
        <span>走子记录</span>
        <span class="kbd">click</span>
      </div>
      <div class="logBody" id="log"></div>
    </div>

    <div class="hint">
      <div>规则实现：车马相仕帅炮兵（含炮隔打、兵过河、帅将不见面）。</div>
      <div>胜负：吃掉对方将/帅即结束（未做将死搜索）。</div>
    </div>
  </div>
</div>

<script>
(() => {
  // === Board coords ===
  // x: 0..8, y: 0..9 (0 at top)
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');

  // layout
  const PAD = 14;
  const GRID_W = cv.width - PAD*2;
  const GRID_H = cv.height - PAD*2;
  const CELL = Math.min(GRID_W/8, GRID_H/9); // cell size
  const ORGX = (cv.width - CELL*8)/2;
  const ORGY = (cv.height - CELL*9)/2;

  const btnReset = document.getElementById('btnReset');
  const btnUndo  = document.getElementById('btnUndo');
  const statusEl = document.getElementById('status');
  const logEl = document.getElementById('log');
  const turnText = document.getElementById('turnText');
  const turnDot = document.getElementById('turnDot');

  // Pieces: {c:'r'|'b', t:'K'|'A'|'B'|'N'|'R'|'C'|'P'}
  // red bottom (y high), black top
  const initial = () => {
    const empty = Array.from({length:10}, ()=>Array(9).fill(null));
    const put = (x,y,c,t)=> empty[y][x] = {c,t};

    // black
    put(0,0,'b','R'); put(1,0,'b','N'); put(2,0,'b','B'); put(3,0,'b','A'); put(4,0,'b','K'); put(5,0,'b','A'); put(6,0,'b','B'); put(7,0,'b','N'); put(8,0,'b','R');
    put(1,2,'b','C'); put(7,2,'b','C');
    put(0,3,'b','P'); put(2,3,'b','P'); put(4,3,'b','P'); put(6,3,'b','P'); put(8,3,'b','P');

    // red
    put(0,9,'r','R'); put(1,9,'r','N'); put(2,9,'r','B'); put(3,9,'r','A'); put(4,9,'r','K'); put(5,9,'r','A'); put(6,9,'r','B'); put(7,9,'r','N'); put(8,9,'r','R');
    put(1,7,'r','C'); put(7,7,'r','C');
    put(0,6,'r','P'); put(2,6,'r','P'); put(4,6,'r','P'); put(6,6,'r','P'); put(8,6,'r','P');

    return empty;
  };

  let board = initial();
  let turn = 'r'; // red first
  let selected = null; // {x,y}
  let legalMoves = []; // [{x,y}]
  let gameOver = false;

  const history = []; // stack of snapshots
  const moveLog = [];

  const CN_NAME = {
    r: { K:'帅', A:'仕', B:'相', N:'马', R:'车', C:'炮', P:'兵' },
    b: { K:'将', A:'士', B:'象', N:'马', R:'车', C:'炮', P:'卒' }
  };

  function cloneBoard(b){
    return b.map(row => row.map(p => p ? {c:p.c,t:p.t} : null));
  }
  function inBounds(x,y){ return x>=0 && x<9 && y>=0 && y<10; }
  function pieceAt(x,y){ return inBounds(x,y) ? board[y][x] : null; }

  function setStatus(html){ statusEl.innerHTML = html; }
  function updateTurnUI(){
    turnText.textContent = (turn==='r'?'红方回合':'黑方回合');
    turnDot.className = 'dot ' + (turn==='r'?'red':'black');
  }

  // === Drawing ===
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    drawBoard();
    drawPieces();
    drawSelection();
  }

  function drawBoard(){
    // board frame
    ctx.save();
    ctx.translate(0,0);
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    ctx.strokeStyle = 'rgba(255,255,255,0.10)';
    roundRect(ctx, 6, 6, cv.width-12, cv.height-12, 18, true, true);

    // grid lines
    ctx.lineWidth = 1.2;
    ctx.strokeStyle = 'rgba(200,220,255,0.22)';

    const left = ORGX, top = ORGY;
    const right = ORGX + CELL*8;
    const bottom = ORGY + CELL*9;

    // horizontal lines y=0..9
    for(let y=0;y<=9;y++){
      const yy = top + CELL*y;
      ctx.beginPath();
      ctx.moveTo(left, yy);
      ctx.lineTo(right, yy);
      ctx.stroke();
    }
    // vertical lines x=0..8 (river break between y=4..5)
    for(let x=0;x<=8;x++){
      const xx = left + CELL*x;
      ctx.beginPath();
      ctx.moveTo(xx, top);
      ctx.lineTo(xx, top + CELL*4);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(xx, top + CELL*5);
      ctx.lineTo(xx, bottom);
      ctx.stroke();
    }

    // palaces diagonals
    drawPalace(3,0);
    drawPalace(3,7);

    // river text
    ctx.fillStyle = 'rgba(200,220,255,0.20)';
    ctx.font = `bold ${Math.floor(CELL*0.55)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('楚 河', left + CELL*2, top + CELL*4.5);
    ctx.fillText('汉 界', left + CELL*6, top + CELL*4.5);

    // coordinate dots (optional small)
    ctx.restore();
  }

  function drawPalace(x0,y0){
    const left = ORGX + CELL*x0;
    const top  = ORGY + CELL*y0;
    ctx.beginPath();
    ctx.moveTo(left, top);
    ctx.lineTo(left + CELL*2, top + CELL*2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(left + CELL*2, top);
    ctx.lineTo(left, top + CELL*2);
    ctx.stroke();
  }

  function drawPieces(){
    for(let y=0;y<10;y++){
      for(let x=0;x<9;x++){
        const p = board[y][x];
        if(!p) continue;
        const {cx,cy} = cellCenter(x,y);

        // disc
        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.45)';
        ctx.shadowBlur = 10;
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.beginPath();
        ctx.arc(cx,cy,CELL*0.42,0,Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // ring
        ctx.lineWidth = 2;
        ctx.strokeStyle = 'rgba(255,255,255,0.16)';
        ctx.beginPath();
        ctx.arc(cx,cy,CELL*0.42,0,Math.PI*2);
        ctx.stroke();

        // text
        ctx.fillStyle = (p.c==='r') ? '#ff6a75' : '#e3e3e3';
        ctx.font = `700 ${Math.floor(CELL*0.52)}px "PingFang SC","Microsoft YaHei",sans-serif`;
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.fillText(CN_NAME[p.c][p.t], cx, cy+1);

        ctx.restore();
      }
    }
  }

  function drawSelection(){
    if(selected){
      const {x,y} = selected;
      const {cx,cy} = cellCenter(x,y);
      // highlight selected
      ctx.save();
      ctx.strokeStyle = 'rgba(77,208,255,0.9)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(cx,cy,CELL*0.46,0,Math.PI*2);
      ctx.stroke();
      ctx.restore();

      // show legal moves
      for(const m of legalMoves){
        const c = cellCenter(m.x,m.y);
        ctx.save();
        const target = pieceAt(m.x,m.y);
        if(target){
          ctx.strokeStyle = 'rgba(255,183,77,0.9)';
          ctx.lineWidth=3;
          ctx.beginPath();
          ctx.arc(c.cx,c.cy,CELL*0.22,0,Math.PI*2);
          ctx.stroke();
        }else{
          ctx.fillStyle = 'rgba(83,242,139,0.85)';
          ctx.beginPath();
          ctx.arc(c.cx,c.cy,CELL*0.12,0,Math.PI*2);
          ctx.fill();
        }
        ctx.restore();
      }
    }
  }

  function roundRect(ctx, x, y, w, h, r, fill, stroke){
    const rr = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+rr, y);
    ctx.arcTo(x+w, y, x+w, y+h, rr);
    ctx.arcTo(x+w, y+h, x, y+h, rr);
    ctx.arcTo(x, y+h, x, y, rr);
    ctx.arcTo(x, y, x+w, y, rr);
    ctx.closePath();
    if(fill) ctx.fill();
    if(stroke) ctx.stroke();
  }

  function cellCenter(x,y){
    return {cx: ORGX + CELL*x, cy: ORGY + CELL*y};
  }
  function pointToCell(px,py){
    // nearest intersection
    const x = Math.round((px - ORGX)/CELL);
    const y = Math.round((py - ORGY)/CELL);
    if(!inBounds(x,y)) return null;
    // must be close enough
    const c = cellCenter(x,y);
    const d = Math.hypot(px-c.cx, py-c.cy);
    if(d > CELL*0.55) return null;
    return {x,y};
  }

  // === Move generation & rules ===
  function isRed(p){ return p && p.c==='r'; }
  function isBlack(p){ return p && p.c==='b'; }
  function sameColor(a,b){ return a && b && a.c===b.c; }

  function findKing(color){
    for(let y=0;y<10;y++){
      for(let x=0;x<9;x++){
        const p=board[y][x];
        if(p && p.c===color && p.t==='K') return {x,y};
      }
    }
    return null;
  }

  function inPalace(color,x,y){
    // x: 3..5
    if(x<3||x>5) return false;
    if(color==='r') return (y>=7 && y<=9);
    return (y>=0 && y<=2);
  }

  function riverCrossed(color,y){
    // red crosses when y<=4, black crosses when y>=5
    return color==='r' ? y<=4 : y>=5;
  }

  function countPiecesBetween(x1,y1,x2,y2){
    // assumes orthogonal
    let cnt=0;
    if(x1===x2){
      const step = y2>y1?1:-1;
      for(let y=y1+step; y!==y2; y+=step){
        if(board[y][x1]) cnt++;
      }
    }else if(y1===y2){
      const step = x2>x1?1:-1;
      for(let x=x1+step; x!==x2; x+=step){
        if(board[y1][x]) cnt++;
      }
    }
    return cnt;
  }

  function kingsFaceToFaceAfterMove(from,to){
    // check rule: kings cannot face directly with no pieces between on same file
    const b = cloneBoard(board);
    const p = b[from.y][from.x];
    b[from.y][from.x]=null;
    b[to.y][to.x]=p;

    let rk=null,bk=null;
    for(let y=0;y<10;y++){
      for(let x=0;x<9;x++){
        const q=b[y][x];
        if(q && q.t==='K'){
          if(q.c==='r') rk={x,y};
          else bk={x,y};
        }
      }
    }
    if(!rk || !bk) return false; // game over handled elsewhere
    if(rk.x !== bk.x) return false;

    const x = rk.x;
    const y1 = rk.y, y2 = bk.y;
    const step = y2>y1?1:-1;
    for(let y=y1+step; y!==y2; y+=step){
      if(b[y][x]) return false;
    }
    return true;
  }

  function isInCheck(color){
    // is 'color' king attacked by opponent?
    const k = findKing(color);
    if(!k) return false;
    const opp = (color==='r')?'b':'r';
    // iterate opponent pieces and see if any can capture king
    for(let y=0;y<10;y++){
      for(let x=0;x<9;x++){
        const p = board[y][x];
        if(!p || p.c!==opp) continue;
        const moves = pseudoMovesFor(x,y,p, true); // attack mode
        if(moves.some(m=>m.x===k.x && m.y===k.y)) return true;
      }
    }
    return false;
  }

  function pseudoMovesFor(x,y,p, attackMode=false){
    // attackMode: for check detection; treat destination capture rules similarly.
    const res=[];
    const add=(nx,ny)=>{
      if(!inBounds(nx,ny)) return;
      const t = pieceAt(nx,ny);
      if(!t) res.push({x:nx,y:ny});
      else if(t.c!==p.c) res.push({x:nx,y:ny});
    };

    if(p.t==='R'){ // rook
      // 4 dirs until blocked
      const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
      for(const [dx,dy] of dirs){
        let nx=x+dx, ny=y+dy;
        while(inBounds(nx,ny)){
          const t=pieceAt(nx,ny);
          if(!t){ res.push({x:nx,y:ny}); }
          else{
            if(t.c!==p.c) res.push({x:nx,y:ny});
            break;
          }
          nx+=dx; ny+=dy;
        }
      }
    } else if(p.t==='N'){ // knight with leg block
      const candidates = [
        {dx: 1, dy:-2, lx:0, ly:-1},
        {dx:-1, dy:-2, lx:0, ly:-1},
        {dx: 2, dy:-1, lx:1, ly:0},
        {dx: 2, dy: 1, lx:1, ly:0},
        {dx: 1, dy: 2, lx:0, ly:1},
        {dx:-1, dy: 2, lx:0, ly:1},
        {dx:-2, dy:-1, lx:-1, ly:0},
        {dx:-2, dy: 1, lx:-1, ly:0},
      ];
      for(const c of candidates){
        const leg = pieceAt(x+c.lx, y+c.ly);
        if(leg) continue;
        add(x+c.dx, y+c.dy);
      }
    } else if(p.t==='B'){ // elephant/bishop (2 diag, cannot cross river, eye block)
      const ds=[[2,2],[2,-2],[-2,2],[-2,-2]];
      for(const [dx,dy] of ds){
        const nx=x+dx, ny=y+dy;
        const ex=x+dx/2, ey=y+dy/2;
        if(!inBounds(nx,ny)) continue;
        if(pieceAt(ex,ey)) continue;
        // river restriction
        if(p.c==='r' && ny<5) continue; // red stays y>=5
        if(p.c==='b' && ny>4) continue; // black stays y<=4
        add(nx,ny);
      }
    } else if(p.t==='A'){ // advisor/guard (1 diag inside palace)
      const ds=[[1,1],[1,-1],[-1,1],[-1,-1]];
      for(const [dx,dy] of ds){
        const nx=x+dx, ny=y+dy;
        if(!inBounds(nx,ny)) continue;
        if(!inPalace(p.c,nx,ny)) continue;
        add(nx,ny);
      }
    } else if(p.t==='K'){ // king (1 orth inside palace) + face-to-face handled in legality
      const ds=[[1,0],[-1,0],[0,1],[0,-1]];
      for(const [dx,dy] of ds){
        const nx=x+dx, ny=y+dy;
        if(!inBounds(nx,ny)) continue;
        if(!inPalace(p.c,nx,ny)) continue;
        add(nx,ny);
      }
      // note: king capturing the other king is prevented by face-to-face rule anyway via legality check.
    } else if(p.t==='C'){ // cannon
      const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
      for(const [dx,dy] of dirs){
        let nx=x+dx, ny=y+dy;
        // first: moving without capture until first piece
        while(inBounds(nx,ny)){
          const t=pieceAt(nx,ny);
          if(!t){
            res.push({x:nx,y:ny});
            nx+=dx; ny+=dy;
          }else break;
        }
        // then: need exactly one screen piece to capture next enemy
        nx+=dx; ny+=dy;
        while(inBounds(nx,ny)){
          const t=pieceAt(nx,ny);
          if(t){
            if(t.c!==p.c) res.push({x:nx,y:ny});
            break;
          }
          nx+=dx; ny+=dy;
        }
      }
    } else if(p.t==='P'){ // pawn/soldier
      const dir = (p.c==='r') ? -1 : 1;
      // forward
      add(x, y+dir);
      // after crossing river can go left/right
      if(riverCrossed(p.c,y)){
        add(x-1,y);
        add(x+1,y);
      }
      // never backward: already excluded
    }
    return res;
  }

  function legalMovesFor(x,y){
    const p = pieceAt(x,y);
    if(!p || p.c!==turn) return [];
    const cand = pseudoMovesFor(x,y,p,false);

    // filter by: not self-check, not kings face-to-face
    const res=[];
    for(const m of cand){
      if(sameColor(p, pieceAt(m.x,m.y))) continue;

      // simulate
      const snapshot = cloneBoard(board);
      const captured = snapshot[m.y][m.x];
      snapshot[m.y][m.x] = snapshot[y][x];
      snapshot[y][x] = null;

      // temp set board for checks
      const old = board;
      board = snapshot;

      const illegalFace = kingsFaceToFaceState();
      const selfCheck = isInCheck(turn);

      // restore
      board = old;

      if(illegalFace) continue;
      if(selfCheck) continue;

      res.push(m);
    }
    return res;
  }

  function kingsFaceToFaceState(){
    const rk = findKing('r');
    const bk = findKing('b');
    if(!rk || !bk) return false;
    if(rk.x !== bk.x) return false;
    const x=rk.x;
    const step = bk.y>rk.y?1:-1;
    for(let y=rk.y+step; y!==bk.y; y+=step){
      if(board[y][x]) return false;
    }
    return true;
  }

  // === Move apply ===
  function applyMove(from,to){
    if(gameOver) return false;
    const p = pieceAt(from.x,from.y);
    if(!p) return false;

    const moves = legalMovesFor(from.x,from.y);
    if(!moves.some(m=>m.x===to.x && m.y===to.y)) return false;

    // save history for undo
    history.push({
      board: cloneBoard(board),
      turn,
      moveLogLen: moveLog.length,
      gameOver
    });

    const target = pieceAt(to.x,to.y);
    board[to.y][to.x] = p;
    board[from.y][from.x] = null;

    // log
    const cap = target ? `×${CN_NAME[target.c][target.t]}` : '';
    moveLog.push(`${turn==='r'?'红':'黑'}：${CN_NAME[p.c][p.t]} ${posStr(from)} → ${posStr(to)} ${cap}`);

    // check win by capturing king
    if(target && target.t==='K'){
      gameOver = true;
      setStatus(`<div class="ok">游戏结束：${turn==='r'?'红方':'黑方'}吃掉了对方${target.c==='r'?'帅':'将'}！</div>`);
    }else{
      // switch turn
      turn = (turn==='r') ? 'b' : 'r';
      // check status: check?
      const chk = isInCheck(turn);
      const me = (turn==='r')?'红方':'黑方';
      const msg = chk ? `<span class="warn">${me}被将军！</span>` : `<span class="ok">${me}未被将军</span>`;
      setStatus(`<div><b>${turn==='r'?'红方回合':'黑方回合'}</b></div><div>状态：${msg}</div>`);
    }

    selected = null;
    legalMoves = [];
    updateTurnUI();
    renderLog();
    draw();
    return true;
  }

  function posStr(p){
    // show as (x+1, y+1) or Chinese file/rank - keep simple
    return `(${p.x+1},${p.y+1})`;
  }

  function renderLog(){
    logEl.innerHTML = moveLog.slice(-60).map((s,i)=>`<div>${moveLog.length- (moveLog.slice(-60).length-i) + 1}. ${escapeHtml(s)}</div>`).join('');
    logEl.scrollTop = logEl.scrollHeight;
  }
  function escapeHtml(s){
    return s.replace(/[&<>"']/g, m=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
  }

  // === Input ===
  function onPickCell(cell){
    if(!cell || gameOver) return;

    const p = pieceAt(cell.x,cell.y);

    // if selected and click a legal move -> move
    if(selected){
      if(legalMoves.some(m=>m.x===cell.x && m.y===cell.y)){
        applyMove(selected, cell);
        return;
      }
      // else reselect if clicking own piece
      if(p && p.c===turn){
        selected = {x:cell.x,y:cell.y};
        legalMoves = legalMovesFor(cell.x,cell.y);
        draw();
        return;
      }
      // click elsewhere cancels
      selected = null;
      legalMoves = [];
      draw();
      return;
    }

    // no selection: select own piece
    if(p && p.c===turn){
      selected = {x:cell.x,y:cell.y};
      legalMoves = legalMovesFor(cell.x,cell.y);
      draw();
    }
  }

  cv.addEventListener('click', (e)=>{
    const r = cv.getBoundingClientRect();
    const x = (e.clientX - r.left) * (cv.width / r.width);
    const y = (e.clientY - r.top) * (cv.height / r.height);
    onPickCell(pointToCell(x,y));
  });

  // touch
  cv.addEventListener('touchstart', (e)=>{
    const t = e.touches[0];
    const r = cv.getBoundingClientRect();
    const x = (t.clientX - r.left) * (cv.width / r.width);
    const y = (t.clientY - r.top) * (cv.height / r.height);
    onPickCell(pointToCell(x,y));
  }, {passive:true});

  // === Controls ===
  btnReset.addEventListener('click', ()=>{
    board = initial();
    turn = 'r';
    selected=null;
    legalMoves=[];
    gameOver=false;
    history.length=0;
    moveLog.length=0;
    setStatus(`<div><b>红方回合</b></div><div>状态：<span class="ok">未被将军</span></div>`);
    updateTurnUI();
    renderLog();
    draw();
  });

  btnUndo.addEventListener('click', ()=>{
    if(history.length===0 || gameOver && history.length===0) return;
    const s = history.pop();
    board = s.board;
    turn = s.turn;
    gameOver = s.gameOver;
    selected=null;
    legalMoves=[];
    moveLog.length = s.moveLogLen;
    updateTurnUI();
    setStatus(`<div><b>${turn==='r'?'红方回合':'黑方回合'}</b></div><div>已悔棋。</div>`);
    renderLog();
    draw();
  });

  // init
  updateTurnUI();
  setStatus(`<div><b>红方回合</b></div><div>状态：<span class="ok">未被将军</span></div>`);
  draw();

})();
</script>
</body>
</html>
