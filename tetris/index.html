<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>俄罗斯方块</title>

<style>
body{
    margin:0;
    background:#000;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:white;
    font-family:sans-serif;
}

canvas{
    background:#000;
    margin:10px auto;
    border:2px solid #444;
    border-radius:8px;
}

#score{
    font-size:18px;
}

.version{
    margin-top:4px;
    font-size:12px;
    color:#aaa;
}

.pause-btn{
    margin-top:8px;
    padding:4px 16px;
    border-radius:999px;
    border:none;
    background:radial-gradient(circle at 30% 30%, #f4f4f4, #c4c4c4);
    color:#111;
    font-size:12px;
    letter-spacing:1px;
    cursor:pointer;
    box-shadow:0 3px 0 #777;
}
.pause-btn:active{
    transform:translateY(2px);
    box-shadow:0 1px 0 #555;
}

#controls{
    margin-top:14px;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    width:260px;
    max-width:90vw;
}

.btn{
    width:44px;
    height:44px;
    background:radial-gradient(circle at 30% 30%, #fff, #d2d2d2);
    color:#000;
    font-size:18px;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    user-select:none;
    -webkit-user-select:none;
    -webkit-touch-callout:none;
    touch-action:manipulation;
    box-shadow:0 3px 0 #777;
}

.btn:active{
    transform:translateY(2px);
    box-shadow:0 1px 0 #555;
}

.dpad{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
}

.dpad-row{
    display:flex;
    gap:6px;
}

.dpad-btn{
    border-radius:8px;
}

.dpad-spacer{
    background:transparent;
    box-shadow:none;
    pointer-events:none;
}

.actions{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    /* 让 A 键大致与十字键中心对齐 */
    margin-top:50px;
}

.action-btn{
    width:50px;
    height:50px;
    border-radius:50%;
    background:radial-gradient(circle at 30% 30%, #ffb9b9, #e63939);
    color:#111;
}

.action-label{
    font-size:11px;
    color:#ccc;
}

.help{
    margin-top:8px;
    max-width:260px;
    font-size:12px;
    color:#ccc;
    text-align:left;
}
.help summary{
    cursor:pointer;
}

@media (max-width: 600px){
    body{
        justify-content:flex-start;
        padding-top:8px;
    }
    canvas{
        margin:6px auto 4px;
    }
    #controls{
        width:260px;
        margin-top:12px;
    }
    .btn{
        width:50px;
        height:50px;
        font-size:18px;
        box-shadow:0 3px 0 #777;
    }
    .action-btn{
        width:60px;
        height:60px;
    }
    .actions{
        margin-top:54px;
    }
    .pause-btn{
        font-size:11px;
        padding:3px 14px;
        margin-top:6px;
        box-shadow:0 3px 0 #777;
    }
}

@media (max-height: 620px){
    body{
        justify-content:flex-start;
        padding:6px 0 10px;
    }
    #controls{
        margin-top:8px;
    }
    .help{
        font-size:11px;
    }
}
</style>
</head>

<body>

<details class="help">
    <summary>游戏操作说明（点击展开）</summary>
    <ul>
        <li>电脑：方向键 ← → 移动，↑ 旋转，↓ 快速下落，P 暂停/继续。</li>
        <li>手机：左侧十字键控制左右移动、下落和旋转（上键），右侧红色 A 也可旋转。</li>
    </ul>
</details>

<div id="score">Score: 0</div>
<div class="version">v1.0.4</div>
<canvas id="game"></canvas>

<div id="controls">
    <div class="dpad">
        <div class="dpad-row">
            <div class="btn dpad-btn dpad-spacer"></div>
            <div class="btn dpad-btn" id="up">↑</div>
            <div class="btn dpad-btn dpad-spacer"></div>
        </div>
        <div class="dpad-row">
            <div class="btn dpad-btn" id="left">←</div>
            <div class="btn dpad-btn dpad-spacer"></div>
            <div class="btn dpad-btn" id="right">→</div>
        </div>
        <div class="dpad-row">
            <div class="btn dpad-btn dpad-spacer"></div>
            <div class="btn dpad-btn" id="down">↓</div>
            <div class="btn dpad-btn dpad-spacer"></div>
        </div>
    </div>
    <div class="actions">
        <div class="btn action-btn" id="rotate">A</div>
        <div class="action-label">旋转</div>
        <button id="pauseBtn" class="pause-btn">开始</button>
    </div>
</div>


<script src="game.js"></script>

</body>
</html>
