<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>经典小游戏合集</title>

<style>
body{
    margin:0;
    min-height:100vh;
    background:radial-gradient(circle at top, #1f2430 0%, #05070b 70%);
    color:#f5f5f5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
    padding:32px 24px 28px;
    background:rgba(14,18,26,.9);
    border-radius:18px;
    box-shadow:0 18px 40px rgba(0,0,0,.6);
    backdrop-filter:blur(10px);
}

h1{
    margin:0 0 8px;
    font-size:26px;
}

.subtitle{
    margin:0 0 28px;
    font-size:13px;
    color:#a0a4b0;
}

.btn{
    display:block;
    width:240px;
    margin:12px auto;
    padding:14px 18px;
    background:#181c27;
    border-radius:12px;
    text-decoration:none;
    color:#f5f5f5;
    font-size:18px;
    transition:background .2s ease, transform .15s ease, box-shadow .15s ease;
}

.btn .icon{
    margin-right:8px;
}

.btn:hover{
    background:#232938;
    transform:translateY(-1px);
    box-shadow:0 8px 18px rgba(0,0,0,.45);
}

.version{
    margin-top:20px;
    font-size:12px;
    color:#777c88;
}
</style>
</head>

<body>

<div class="container">
  <h1>MU 的小游戏</h1>
  <p class="subtitle">一些摸鱼小游戏，随时点开玩一局。</p>

  <a class="btn" href="./snake/"><span class="icon">🐍</span>贪吃蛇</a>
  <a class="btn" href="./tetris/"><span class="icon">🧱</span>俄罗斯方块</a>
  <a class="btn" href="./whackmole/"><span class="icon">🔨</span>打地鼠</a>
  <a class="btn" href="./2048/"><span class="icon">🎯</span>2048</a>
  <a class="btn" href="./gomoku/"><span class="icon">⚫</span>五子棋(AI)</a>
  <a class="btn" href="./gomoku_pvp/"><span class="icon">⚪</span>五子棋(双人)</a>
  <a class="btn" href="./xiangqi/"><span class="icon">🐉</span>中国象棋(双人)</a>
    <a class="btn" href="./sokoban/"><span class="icon">📦</span>推箱子</a>

  <div class="version">v1.0.6</div>
</div>

</body>

</html>
